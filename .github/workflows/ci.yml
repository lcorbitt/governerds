name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    env:
      # Non-secret placeholders so env validation and the build pass in CI.
      APP_ENV: development
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder
      EMAIL_PROVIDER: resend
      JOB_PROVIDER: inngest
      ANALYTICS_PROVIDER: none
      POSTHOG_HOST: https://us.i.posthog.com
      NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: End-to-end + accessibility
    runs-on: ubuntu-latest
    env:
      APP_ENV: development
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder
      EMAIL_PROVIDER: resend
      JOB_PROVIDER: inngest
      ANALYTICS_PROVIDER: none
      POSTHOG_HOST: https://us.i.posthog.com
      NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
